# For Databricks Apps: either keep the warehouse UUID below or remove it and use
#   - name: DATABRICKS_WAREHOUSE_ID
#     valueFrom: sql-warehouse
# then add a SQL warehouse resource (key: sql-warehouse) in the app configuration UI.
command:
  - uvicorn
  - backend.server:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_HOST
    value: https://e2-demo-field-eng.cloud.databricks.com
  - name: DATABRICKS_CATALOG
    value: bx3
  - name: DATABRICKS_SCHEMA
    value: otel_demo
  - name: OTEL_SERVICE_NAME
    value: otel-simulator
  - name: DATABRICKS_WAREHOUSE_ID
    value: "67bbe3acc184b4aa"
