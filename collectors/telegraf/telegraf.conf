# Telegraf — Metrics collector sidecar
# Receives OTLP metrics on localhost:4319 (gRPC), forwards to Databricks OTLP endpoint.
# Note: Telegraf's internal model drops optional histogram fields (min/max/start_time_unix_nano)
# but Databricks accepts the payloads — those fields are optional in the OTLP spec.
#
# Environment variables (set by start-sidecars.sh):
#   DATABRICKS_HOST_BARE  — workspace host without https://
#   DATABRICKS_TOKEN      — PAT or OAuth token

[agent]
  interval = "5s"
  round_interval = true
  flush_interval = "5s"
  flush_jitter = "0s"
  omit_hostname = false

# Accept OTLP metrics over gRPC on port 4319
[[inputs.opentelemetry]]
  service_address = "0.0.0.0:4319"

# Forward to Databricks via OTLP/HTTP (protobuf over HTTPS)
[[outputs.opentelemetry]]
  service_address = "https://${DATABRICKS_HOST_BARE}:443/api/2.0/otel/v1/metrics"
  encoding_type = "protobuf"
  timeout = "10s"

  [outputs.opentelemetry.headers]
    Authorization = "Bearer ${DATABRICKS_TOKEN}"
    X-Databricks-UC-Table-Name = "telemetry.otel.telegraf_otel_metrics"
    X-Databricks-Workspace-Url = "https://${DATABRICKS_HOST_BARE}"
